syntax = "proto3";

option go_package = "github.com/vincentvtran/pi-controller/proto";

package homeserver.proto;

import "google/protobuf/empty.proto";
/**
 * Service API definition
 */
service PiAgentController {
  rpc configureCamera(CameraRequest) returns (OperationResponse) {}
  rpc retrieveCameraStatus(google.protobuf.Empty) returns (OperationResponse) {}
}

/**
 * Operation request and response objects
 */
message CameraRequest {
  string client_id = 1;
  CameraParameter parameters = 2;
}

message CameraParameter {
  bool enable = 1;
}

message OperationResponse {
  string api_version = 1;
  int32 status_code = 2;
  string output = 3;
}

