apiVersion: apps/v1
kind: Deployment
metadata:
  name: pi-controller-server
  namespace: pi-controller
  labels:
    app: pi-controller-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pi-controller-server
  template:
    metadata:
      labels:
        app: pi-controller-server
    spec:
      containers:
      - name: pi-controller-server
        image: pi-controller-server:latest
        ports:
        - containerPort: 5005
        resources:
          limits:
            memory: "256Mi"
            cpu: "500m"
          requests:
            memory: "128Mi"
            cpu: "250m"
        env:
        - name: STAGE
          value: "prod"
        command: ["./pi-controller-server", "--stage=prod"]
---
apiVersion: v1
kind: Service
metadata:
  name: pi-controller-server-service
  namespace: pi-controller
spec:
  type: LoadBalancer
  selector:
    app: pi-controller-server
  ports:
  - protocol: TCP
    port: 5005
    targetPort: 5005
